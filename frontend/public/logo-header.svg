<svg xmlns="http://www.w3.org/2000/svg" width="520" height="120" viewBox="0 0 520 120">
 <!-- Icon: spyglass -->
 <g transform="translate(16, 12)">
 <rect width="96" height="96" rx="16" fill="#1a1a2e" stroke="#00ff88" stroke-width="1" stroke-opacity="0.3"/>
 <g transform="translate(18, 14)">
   <!-- Magnifying glass circle -->
   <circle cx="28" cy="28" r="22" fill="none" stroke="#00ff88" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
   <!-- Handle -->
   <line x1="44" y1="44" x2="62" y2="68" stroke="#00ff88" stroke-width="6" stroke-linecap="round"/>
   <!-- Inner highlight -->
   <circle cx="28" cy="28" r="22" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-opacity="0.15"/>
 </g>
 </g>

 <!-- Wordmark -->
 <text x="130" y="68" font-family="Arial Black, Arial, Helvetica, sans-serif" font-weight="900" font-size="48" fill="#ffffff" letter-spacing="-1">Trad<tspan fill="#00ff88">Vue</tspan></text>
 
 <!-- Tagline -->
 <text x="132" y="90" font-family="Courier New, monospace" font-weight="700" font-size="10" fill="#00ff88" opacity="0.6" letter-spacing="4">AI DRIVEN ALPHA</text>
</svg>
